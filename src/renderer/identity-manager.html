<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Identities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #111111;
      --bg-secondary: #181818;
      --bg-tertiary: #242424;
      --bg-input: #1e1e1e;
      --bg-hover: #2a2a2a;
      --text-primary: #ececec;
      --text-secondary: #a0a0a0;
      --text-muted: #5c5c5c;
      --accent: #ffffff;
      --border: #2a2a2a;
      --success: #4caf50;
      --danger: #e05555;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 14px;
      padding: 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    h2 { margin-bottom: 16px; font-weight: 500; }
    .identity-list {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 16px;
    }
    .identity-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .identity-info { flex: 1; min-width: 0; }
    .identity-name {
      font-weight: 500;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .identity-fingerprint {
      font-size: 11px;
      color: var(--text-muted);
      font-family: monospace;
    }
    .identity-default-badge {
      font-size: 11px;
      color: var(--success);
      margin-left: 8px;
    }
    .identity-actions {
      display: flex;
      gap: 6px;
      margin-left: 12px;
      flex-shrink: 0;
    }
    button {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 12px;
    }
    button:hover { background: var(--bg-hover); }
    button.btn-primary {
      background: var(--accent);
      color: #111;
      border-color: var(--accent);
    }
    button.btn-primary:hover { background: #d4d4d4; }
    button.btn-danger { color: var(--danger); border-color: var(--danger); }
    button.btn-danger:hover { background: rgba(224, 85, 85, 0.1); }
    .toolbar { display: flex; gap: 8px; }
    .create-form {
      display: none;
      margin-bottom: 16px;
      gap: 8px;
      align-items: center;
    }
    .create-form.active { display: flex; }
    .create-form input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
    }
    .create-form input:focus { border-color: var(--accent); }
    .status-text {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h2>Identities</h2>
  <div class="status-text" id="status"></div>
  <div class="create-form" id="create-form">
    <input type="text" id="input-name" placeholder="Identity name" maxlength="64" autocomplete="off">
    <button class="btn-primary" id="btn-create-confirm">Create</button>
    <button id="btn-create-cancel">Cancel</button>
  </div>
  <div class="identity-list" id="identity-list"></div>
  <div class="toolbar">
    <button class="btn-primary" id="btn-create">New Identity</button>
    <button id="btn-import">Import...</button>
  </div>
  <script src="identity-manager.js"></script>
</body>
</html>
